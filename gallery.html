<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="./gallery.css">
<body>
    <section id="gallery">
        <div class="gallery-header">

                    <img src="./dish1.jpg" alt="image2" width="265px" height="200px">

                <div class="grid-cont-item2">
                    <img src="./dish2.jpg" alt="image3" width="265px" height="200px">
                </div>
                <div class="grid-cont-item3">

                </div>
                <div class="grid-cont-item4">
                    <img src="./dish4.jpg" alt="image5" width="265px" height="200px">
                </div>
            </div>
        </div>

        <div class="grid-cont">
            <div class="grid-cont-content">

            </div>
            <div class="grid-cont-items">
                <div class="grid-cont-item1">
                    <img src="./interior3.jpg" alt="image2" width="265px" height="200px">
                </div>
                <div class="grid-cont-item2">

                </div>
                <div class="grid-cont-item3">

                <div class="grid-cont-item4">
                    <img src="./interior5.jpg" alt="image5" width="265px" height="200px">
                </div>
            </div>
        </div>

        <div class="grid-cont">
            <div class="grid-cont-content">
                <h3>Dining Atmosphere</h3>
            </div>
            <div class="grid-cont-items">
                <div class="grid-cont-item1">
                    <img src="./atm1.jpg" alt="image2" width="265px" height="200px">
                </div>
                <div class="grid-cont-item2">
                    <img src="./atm2.jpg" alt="image3" width="265px" height="200px">
                </div>
                <div class="grid-cont-item3">
                    <img src="./atm3.jpg" alt="image4" width="265px" height="200px">

                <div class="grid-cont-item4">
                    <img src="./atm4.jpg" alt="image5" width="265px" height="200px">

            </div>
            <div class="grid-cont-items">
                <div class="grid-cont-item1">
                    <img src="./kitch1.jpg" alt="image2" width="265px" height="200px">
                </div>
                <div class="grid-cont-item2">
                    <img src="./kitch2.jpg" alt="image3" width="265px" height="200px">
                </div>
                <div class="grid-cont-item3">
                    <img src="./kitch3.jpg" alt="image4" width="265px" height="200px">
                </div>
                <div class="grid-cont-item4">
                    <img src="./kitch4.jpg" alt="image5" width="265px" height="200px">
