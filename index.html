<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban-Kitchen-CSS-G29-project</title>
    <link rel="stylesheet" href="./index.css">

</head>
<body>  
    <section class="contact-hero">
        <h1>Visit Us</h1>
    </section>

    <section class="contact-container">
        <div class="contact-info">
            <h2>Contact Information</h2>
            <p><strong>Address:</strong> G29 Street, Enugu, Nigeria</p>
            <p><strong>Phone:</strong> (+234) 7066645224</p>
            <p><strong>Email:</strong> info@urban-kitchen.com</p>
            <h3>Opening Hours</h3>
            
            <ul>
                <li>Mon-thu: 11:00AM - 10:00 PM</li>
                <li>Fri-Sat: 11:00Am - 11:30 PM</li>
                <li>Sun: 12:00 PM - 9:00 PM</li>
            </ul>
            <div class="social-links">
                <a href="#">Instagram</a> |
                <a href="#">Facebook</a> |
                <a href="#">X</a> 

            </div>
       </div>



            <div class="contact-form">
                <h2>Book a Table</h2>
                <form>
                    <input type="Date" required>
                    <input type="time" required>
                    <input type="text" placeholder="Number of Guests" min="1" required>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="tel" placeholder="Your Phone" required>
                    <textarea placeholder="Your Message"></textarea>
                    <button type="submit">Submit</button>
                </form>

            </div>
        
    </section>
</body>
</html>
